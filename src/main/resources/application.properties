spring.application.name=restaurant-api
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

security.jwt.secret=${JWT_SECRET:default-dev-secret-key-that-is-at-least-32-chars-long}
security.jwt.expiration=${JWT_EXPIRATION:3600000}

app.firebase.enabled=${FIREBASE_ENABLED:true}
app.firebase.project-id=${FIREBASE_PROJECT_ID:${GOOGLE_CLOUD_PROJECT:restaurant-api-3a3f6}}
app.firebase.database-url=${FIREBASE_DATABASE_URL:}
app.firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:${GOOGLE_APPLICATION_CREDENTIALS:}}
app.firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON:}
