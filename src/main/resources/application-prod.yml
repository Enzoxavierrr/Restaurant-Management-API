spring:
  datasource:
    url: jdbc:postgresql://prod-db-server:5432/restaurant_prod
    username: prod_user
    password: prod_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
server:
  port: 80
